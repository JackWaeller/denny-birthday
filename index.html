<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfleet Terminal - Denny</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }

        @keyframes flyBy {
            0% { left: -800px; }
            100% { left: 100%; }
        }

        .defiant-container {
            position: fixed;
            top: 20%;
            pointer-events: none;
            animation: flyBy 20s linear infinite;
        }

        /* LCARS-Interface (Bleibt gleich) */
        .lcars-container { background-color: #111; border: 4px solid #222; border-radius: 20px; padding: 20px; max-width: 550px; width: 90%; color: #ff9900; z-index: 10; }
        .btn-terminal { background-color: #ff9900; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="defiant-container">
    <!-- BANNER zuerst im Code, SCHIFF als zweites Element für die visuelle Tiefe -->
    <svg viewBox="0 0 500 100" width="800" height="auto">
        <!-- Das Banner -->
        <rect x="0" y="20" width="250" height="30" rx="5" fill="#ff3333" stroke="#fff" stroke-width="2"/>
        <text x="10" y="43" font-family="Courier New" font-weight="bold" font-size="20" fill="white">HAPPY BIRTHDAY MAUS!</text>
        
        <!-- Schiff folgt dem Banner (nach rechts verschoben) -->
        <g transform="translate(260, 10)">
            <path d="M 15,35 Q 35,33 55,30 Q 35,37 15,35" fill="#0077ff" opacity="0.6"/>
            <path d="M 20,32 C 30,32 35,22 45,20 C 55,18 70,22 80,28 C 85,31 105,34 115,40 C 105,46 85,49 80,52 C 70,58 55,62 45,60 C 35,58 30,48 20,48 Z" fill="#2a3245" stroke="#4a5775" stroke-width="1.5"/>
            <rect x="40" y="22" width="25" height="4" rx="1" fill="#ff3300"/>
        </g>
    </svg>
</div>

<div class="lcars-container">
    <div style="border-bottom: 6px solid #ff9900; padding-bottom: 10px;">KOMMUNIKATIONSAKTIV</div>
    <div id="content">
        <p>System bereit, Commander.</p>
        <button class="btn-terminal" onclick="this.innerHTML='SICHERHEITSFREIGABE ERTEILT'">TERMINAL</button>
    </div>
</div>

</body>
</html>
