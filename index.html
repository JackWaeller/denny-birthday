<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Defiant-Flug</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; height: 100vh; }
        
        /* Die Animation: Sie schiebt die komplette Einheit von links nach rechts */
        @keyframes flug-sequenz {
            0% { transform: translateX(-500px); }
            100% { transform: translateX(100vw); }
        }

        .flug-container {
            display: flex; 
            align-items: center; 
            position: absolute; 
            top: 40%;
            animation: flug-sequenz 10s linear infinite;
        }
    </style>
</head>
<body>

    <div class="flug-container">
        <div style="width: 80px; height: 30px; background-color: #0077ff; border-radius: 5px;"></div>
        
        <div style="margin-left: 15px; color: #fff; font-weight: bold; font-size: 20px; background-color: #ff3333; padding: 10px; border-radius: 3px;">
            HAPPY BIRTHDAY MAUS!
        </div>
    </div>

</body>
</html>
