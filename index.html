<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Defiant Mission</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Courier New', monospace;
        }

        /* Sterne als echtes Hintergrundbild, damit sie nicht verschoben werden */
        .stars { 
            position: fixed; width: 100%; height: 100%; z-index: 0;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 30px);
            background-size: 100px 100px;
        }

        /* Flugbahn: Fixe Position, keine Flexbox! */
        .ship-container {
            position: absolute; top: 30%; left: -500px;
            animation: flight 15s linear infinite;
            z-index: 2;
        }
        @keyframes flight { from { left: -500px; } to { left: 110%; } }

        /* Schiff und Banner einfach nebeneinander als Inline-Elemente */
        .ship { display: inline-block; width: 80px; height: 30px; background: #0077ff; }
        .banner { 
            display: inline-block; background: #ff3333; color: #fff; 
            padding: 10px; font-weight: bold; margin-left: 10px; 
        }

        .console { position: absolute; top: 50px; left: 50px; color: #ff9900; z-index: 10; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="ship-container">
        <div class="ship"></div>
        <div class="banner">HAPPY BIRTHDAY MAUS!</div>
    </div>

    <div class="console">
        <div id="status">STATUS: BEREIT</div>
        <button onclick="document.getElementById('status').innerText='MISSION AKTIV'">TERMINAL STARTEN</button>
    </div>

</body>
</html>
