<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Starfleet Terminal - Deep Space</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            /* Sterne */
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 500px 500px;
        }

        /* Wurmloch-Animation */
        .wormhole {
            position: fixed;
            top: 50%; left: 50%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #4a0082, #000);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(50px);
            opacity: 0.3;
            animation: pulse 10s infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
            to { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
        }

        @keyframes flyBy {
            0% { left: -600px; }
            100% { left: 110%; }
        }

        .ship-container {
            position: fixed; top: 25%;
            display: flex; align-items: center;
            animation: flyBy 15s linear infinite;
            z-index: 2;
        }

        .birthday-banner {
            background: #ff3333; color: #fff; padding: 10px 20px;
            font-weight: bold; font-size: 20px; border-radius: 5px;
            margin-left: 20px; white-space: nowrap; border: 2px solid #fff;
        }

        .lcars-container { 
            background-color: #111; border: 4px solid #222; border-radius: 20px; padding: 20px; 
            max-width: 550px; width: 90%; color: #ff9900; position: absolute; 
            top: 50px; left: 5%; z-index: 3;
        }
    </style>
</head>
<body>

<div class="wormhole"></div>

<div class="ship-container">
    <svg width="150" height="60" viewBox="0 0 150 60">
        <path d="M 0,20 L 100,20 L 80,50 L 20,50 Z" fill="#0077ff" />
        <rect x="40" y="10" width="40" height="10" fill="#ff3300" />
    </svg>
    <div class="birthday-banner">HAPPY BIRTHDAY MAUS!</div>
</div>

<div class="lcars-container">
    <div id="content">PADD ONLINE. WURMLOCH-AKTIVITÄT DETEKTIERT.</div>
    <button id="audio-btn" style="background:#ff9900; border:none; padding:10px; cursor:pointer; font-weight:bold; margin-top:10px;">
        SOUND-SYSTEM AKTIVIEREN
    </button>
</div>

<script>
    // Audio-Kontext für subtiles Flimmern
    document.getElementById('audio-btn').onclick = function() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        this.innerHTML = "SOUND AKTIV";
    };
</script>

</body>
</html>
