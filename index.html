<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Starfleet Terminal</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }

        @keyframes flyBy {
            0% { left: -900px; }
            100% { left: 100%; }
        }

        .defiant-container {
            position: fixed;
            top: 20%;
            pointer-events: none;
            animation: flyBy 20s linear infinite;
        }

        .lcars-container { background-color: #111; border: 4px solid #222; border-radius: 20px; padding: 20px; max-width: 550px; width: 90%; color: #ff9900; z-index: 10; }
        .btn-terminal { background-color: #ff9900; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .boot-log { color: #33ff33; }
    </style>
</head>
<body>

<div class="defiant-container">
    <!-- SVG: Schiff links, Banner rechts am Schleppseil -->
    <svg viewBox="0 0 600 100" width="800">
        <!-- Das Schiff -->
        <g transform="translate(0, 10)">
            <path d="M 15,35 Q 35,33 55,30 Q 35,37 15,35" fill="#0077ff"/>
            <path d="M 20,32 C 30,32 35,22 45,20 C 80,28 115,40 45,60 C 35,58 30,48 20,48 Z" fill="#2a3245" stroke="#4a5775"/>
            <rect x="40" y="22" width="25" height="4" fill="#ff3300"/>
        </g>
        <!-- Das Banner -->
        <rect x="130" y="20" width="300" height="35" rx="5" fill="#ff3333" stroke="#fff" stroke-width="2"/>
        <text x="145" y="45" font-family="Courier New" font-weight="bold" font-size="22" fill="white">HAPPY BIRTHDAY MAUS!</text>
    </svg>
</div>

<div class="lcars-container">
    <div id="boot-log" class="boot-log">PADD-Synchronisation...</div>
    <div id="content" style="display:none;">
        <p>SYSTEM BEREIT. ZUGRIFF ERTEILT.</p>
    </div>
    <button id="access-btn" class="btn-terminal" onclick="unlock()">Terminal freischalten</button>
</div>

<script>
    setTimeout(() => { document.getElementById('boot-log').innerHTML += "<br>READY."; }, 800);
    function unlock() {
        document.getElementById('boot-log').style.display = 'none';
        document.getElementById('access-btn').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }
</script>
</body>
</html>
