<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Defiant-Terminal</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Courier New', monospace;
        }

        /* Sterne: Jetzt als Hintergrund-Pattern, das sich nicht mehr bewegen kann */
        .stars { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.5) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* Der Flug-Container: Hier ist das Schiff und Banner fest zusammengeklebt */
        .flug-gruppe {
            position: fixed; top: 30%; left: -400px;
            display: inline-block;
            animation: fliegen 15s linear infinite;
            z-index: 2;
        }

        @keyframes fliegen {
            from { transform: translateX(0); }
            to { transform: translateX(2000px); }
        }

        /* Das "Schiff" ist jetzt einfach nur ein blaues Element, 
           das Banner hängt fest rechts dran */
        .objekt-einheit {
            display: flex;
            align-items: center;
        }

        .schiff-form { width: 100px; height: 40px; background: #0077ff; border-radius: 5px; }
        .banner-form { 
            background: #ff3333; color: #fff; padding: 10px 20px; 
            margin-left: 10px; font-weight: bold; border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="flug-gruppe">
        <div class="objekt-einheit">
            <div class="schiff-form"></div>
            <div class="banner-form">HAPPY BIRTHDAY MAUS!</div>
        </div>
    </div>

    <div style="position:relative; z-index:10; padding:20px; color:#ff9900;">
        <button onclick="alert('System läuft!')">TERMINAL STARTEN</button>
    </div>

</body>
</html>
