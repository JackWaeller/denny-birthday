<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        
        .flug-einheit {
            position: fixed; top: 30%; left: -400px;
            animation: move 15s linear infinite;
            display: flex; align-items: center;
        }
        @keyframes move { from { transform: translateX(0); } to { transform: translateX(120vw); } }
    </style>
</head>
<body>
    <div class="flug-einheit">
        <div style="width:100px; height:40px; background:#0077ff; border-radius: 5px;"></div>
        <div style="background:#ff3333; color:#fff; padding:10px 20px; font-weight:bold; margin-left:10px;">HAPPY BIRTHDAY MAUS!</div>
    </div>
</body>
</html>
