<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Starfleet Terminal - Maus</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }

        @keyframes flyBy {
            0% { left: -900px; }
            100% { left: 120%; }
        }

        .defiant-container {
            position: fixed;
            top: 20%;
            pointer-events: none;
            animation: flyBy 20s linear infinite;
        }

        .lcars-container { background-color: #111; border: 4px solid #222; border-radius: 20px; padding: 20px; max-width: 550px; width: 90%; color: #ff9900; z-index: 10; }
        .btn-terminal { background-color: #ff9900; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .boot-log { color: #33ff33; }
    </style>
</head>
<body>

<div class="defiant-container">
    <!-- SVG ohne komplexe Gruppen, damit das rote X verschwindet -->
    <svg width="800" height="100">
        <!-- Das Schiff (einfache Pfade) -->
        <path d="M 50,40 L 150,40 L 130,60 L 70,60 Z" fill="#0077ff" />
        <rect x="80" y="30" width="40" height="10" fill="#ff3300" />
        
        <!-- Das Banner (einfaches Rechteck und Text) -->
        <rect x="200" y="25" width="350" height="40" rx="5" fill="#ff3333" stroke="#fff" stroke-width="2" />
        <text x="220" y="55" font-family="Arial" font-weight="bold" font-size="24" fill="white">HAPPY BIRTHDAY MAUS!</text>
    </svg>
</div>

<div class="lcars-container">
    <div id="boot-log" class="boot-log">INITIALISIERE PADD...</div>
    <div id="content" style="display:none;">
        <p>SYSTEM BEREIT. ALLES GUTE, MAUS!</p>
    </div>
    <button id="access-btn" class="btn-terminal" onclick="unlock()">TERMINAL STARTEN</button>
</div>

<script>
    function unlock() {
        document.getElementById('boot-log').style.display = 'none';
        document.getElementById('access-btn').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }
</script>
</body>
</html>
