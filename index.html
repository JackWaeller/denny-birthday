<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Defiant-Terminal</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        .stars { 
            position: fixed; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.5) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Container der das Banner ZIEHT */
        .flug-gruppe {
            position: fixed; top: 30%; 
            display: flex; align-items: center;
            /* Animation bewegt das Banner vorne, das Schiff folgt */
            animation: fliegen 12s linear infinite;
        }

        @keyframes fliegen {
            0% { transform: translateX(-400px); }
            100% { transform: translateX(110vw); }
        }

        /* Banner vorne (damit es gezogen wird) */
        .banner-form { 
            background: #ff3333; color: #fff; padding: 10px 20px; 
            font-weight: bold; border: 2px solid white; white-space: nowrap;
        }

        /* Schiff hinten dran */
        .schiff-form { 
            width: 80px; height: 30px; background: #0077ff; 
            margin-left: -5px; /* Etwas Überlappung für die Leine */
            border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="flug-gruppe">
        <div class="banner-form">HAPPY BIRTHDAY MAUS!</div>
        <div class="schiff-form"></div>
    </div>

    <div style="position:relative; z-index:10; padding:20px; color:#ff9900;">
        <button onclick="alert('System läuft!')">TERMINAL STARTEN</button>
    </div>

</body>
</html>
